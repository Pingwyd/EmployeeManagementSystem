permissions:
  contents: write
  packages: write

name: Release
on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag name (e.g. v1.2.0). If omitted, branch suffix or short SHA will be used.'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build package
        run: mvn -B -DskipTests package

      - name: Find JAR
        run: |
          JAR=$(find target -type f -name '*.jar' | head -n 1)
          if [ -z "$JAR" ]; then echo "No JAR found" >&2; exit 1; fi
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV
          cp "$JAR" release-app.jar

      - name: Determine tag name
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            REF=${GITHUB_REF#refs/heads/}
            case "$REF" in
              release/*) TAG_NAME=${REF#release/} ;;
              *) TAG_NAME=$(git rev-parse --short HEAD) ;;
            esac
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Normalize owner to lowercase
        run: |
          OWNER_LOWER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "OWNER_LOWER=$OWNER_LOWER" >> $GITHUB_ENV

      - name: Create Git tag (if not exists)
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $TAG_NAME" || true
          git push origin "$TAG_NAME" || true

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/employee-management-system:${{ env.TAG_NAME }}
            ghcr.io/${{ env.OWNER_LOWER }}/employee-management-system:latest

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.TAG_NAME }}
          release_name: Release ${{ env.TAG_NAME }}
          body: Automated release ${{ env.TAG_NAME }}
          draft: false
          prerelease: false

      - name: Upload JAR to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-app.jar
          asset_name: system-${{ env.TAG_NAME }}.jar
          asset_content_type: application/java-archive

      - name: Smoke test (optional)
        run: |
          echo "Skipping smoke test — implement as needed"
