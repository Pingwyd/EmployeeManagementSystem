<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif;">
<div style="background-color: #f5f5f5; padding: 20px;">
    <h2 style="color: #333;">Welcome to our Company!</h2>
    <p style="font-size: 16px;">Your profile has been created.</p>
    <p style="font-size: 16px;">Go to http://localhost:8080/api/auth/verify</p>
    <p style="font-size: 16px;">Input the OTP to verify your account and <i><b>SET YOUR PASSWORD</b></i>i></p>
    <div style="background-color: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <h3 style="color: #333;">Verification Code:</h3>
        <p style="font-size: 18px; font-weight: bold; color: #007bff;" th:text="${VerificationCode}"></p>
    </div>
</div>
</body>
</html>
